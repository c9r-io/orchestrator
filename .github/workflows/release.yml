name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} --bin orchestrator --bin orchestratord

      - name: Package release archive
        run: scripts/package-release.sh "$RELEASE_TAG" "${{ matrix.target }}"

      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 "orchestrator-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" > "orchestrator-${RELEASE_TAG}-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/orchestrator-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            dist/orchestrator-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package skills
        run: scripts/package-skills.sh "$RELEASE_TAG"

      - name: Build checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*.sha256 > "dist/orchestrator-${RELEASE_TAG}-sha256sums.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*sha256*

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate formula
        run: scripts/update-homebrew-formula.sh "$RELEASE_TAG" > "${{ github.workspace }}/orchestrator.rb"

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.TAP_GITHUB_TOKEN }}
        with:
          source_file: orchestrator.rb
          destination_repo: c9r-io/homebrew-tap
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "orchestrator ${{ env.RELEASE_TAG }}"

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      id-token: write
      contents: read
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Obtain crates.io publish token (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: |
          set -euo pipefail
          for crate in \
            crates/proto \
            crates/orchestrator-config \
            core \
            crates/orchestrator-scheduler \
            crates/cli \
            crates/daemon; do
            echo "::group::Publishing ${crate}"
            cargo publish --manifest-path "${crate}/Cargo.toml"
            echo "::endgroup::"
            # crates.io index needs time to propagate
            sleep 30
          done
