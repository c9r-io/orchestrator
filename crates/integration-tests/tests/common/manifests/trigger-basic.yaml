apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: echo
spec:
  capabilities:
    - qa
  command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"pass\",\"description\":\"ok\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_only
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Trigger
metadata:
  name: webhook-trigger
spec:
  event:
    source: webhook
  action:
    workflow: qa_only
    workspace: default
    start: false
  concurrencyPolicy: Allow
---
apiVersion: orchestrator.dev/v2
kind: Trigger
metadata:
  name: throttled-trigger
spec:
  event:
    source: webhook
  action:
    workflow: qa_only
    workspace: default
    start: false
  concurrencyPolicy: Allow
  throttle:
    minInterval: 3600
---
apiVersion: orchestrator.dev/v2
kind: Trigger
metadata:
  name: forbid-trigger
spec:
  event:
    source: webhook
  action:
    workflow: qa_only
    workspace: default
    start: false
  concurrencyPolicy: Forbid
---
apiVersion: orchestrator.dev/v2
kind: Trigger
metadata:
  name: suspended-trigger
spec:
  event:
    source: webhook
  action:
    workflow: qa_only
    workspace: default
    start: false
  concurrencyPolicy: Allow
  suspend: true
