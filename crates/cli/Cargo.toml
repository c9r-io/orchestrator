[package]
name = "orchestrator-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "orchestrator"
path = "src/main.rs"

[dependencies]
orchestrator-proto = { path = "../proto" }
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
clap_complete = "4.5"
prost = "0.13"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yml = "0.0.12"
tokio = { version = "1.44", features = ["macros", "rt-multi-thread", "sync", "signal"] }
tonic = "0.12"
tokio-stream = "0.1"
tower = "0.4"
hyper-util = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
