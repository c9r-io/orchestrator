# Benchmark agent: OpenCode shell + MiniMax-M2.7-highspeed model
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: bench-opencode-minimax
  description: "OpenCode + MiniMax-M2.7-highspeed"
spec:
  capabilities:
    - plan
    - implement
    - qa_testing
    - qa_doc_gen
    - ticket_fix
    - align_tests
    - self_test
  command: opencode run "{prompt}" -m minimax-coding-plan/MiniMax-M2.7-highspeed --format json
  env:
    - fromRef: minimax
  metadata:
    benchmark_shell: "opencode"
    benchmark_model: "MiniMax-M2.7-highspeed"
