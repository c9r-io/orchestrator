# Benchmark variant of self-bootstrap workflow.
# Adds an evaluation step after self_test to capture a structured score.
# Use with different Agent manifests to benchmark shell × model combinations.
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: plan
spec:
  description: "Analyze the goal and produce an implementation plan"
  prompt: >-
    Analyze the following task goal and produce a concrete implementation plan.
    List the files to modify, the changes needed, and the order of operations.
    Goal: {goal}
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: implement
spec:
  description: "Implement the plan from the previous step"
  prompt: >-
    Implement the plan produced in the previous step.
    Read the plan output at: {plan_output_path}
    Write clean, idiomatic Rust code. Run `cargo check` before finishing.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: self_test
spec:
  description: "Run the full test suite"
  prompt: >-
    Run `cargo test --workspace` and `cargo clippy --workspace -- -D warnings`.
    Fix any failures. Report pass/fail status.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: benchmark_eval
spec:
  description: "Evaluate task output with 6-dimension structured scoring (0-60)"
  prompt: >-
    You are an impartial evaluator. First run `git diff --stat` — if no files
    changed, score task_completion=0 and all other dimensions=0.

    Six dimensions (each 0-10):
    1. Task Completion: actual code changes addressing the goal
    2. Code Quality: correct, idiomatic, concise implementation
    3. Test Coverage: meaningful unit tests for new/changed code
    4. Execution Efficiency: wall time relative to task complexity
    5. Step Success Rate: workflow steps exiting normally
    6. Engineering Standards: error handling, docs, lint, safety

    Run the project's build/test/lint commands, then output JSON:
    {"task_completion":N,"code_quality":N,"test_coverage":N,"execution_efficiency":N,"step_success_rate":N,"engineering_standards":N,"total_score":N,"dimensions":[{"name":"Task Completion","score":N},{"name":"Code Quality","score":N},{"name":"Test Coverage","score":N},{"name":"Execution Efficiency","score":N},{"name":"Step Success Rate","score":N},{"name":"Engineering Standards","score":N}],"notes":"..."}
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: benchmark-bootstrap
spec:
  max_parallel: 1
  steps:
    - id: plan
      type: plan
      scope: task
      template: plan
      enabled: true
      repeatable: false

    - id: implement
      type: implement
      scope: task
      template: implement
      enabled: true
      repeatable: true

    - id: self_test
      type: self_test
      scope: task
      template: self_test
      enabled: true
      repeatable: true

    - id: benchmark_eval
      type: qa_testing
      scope: task
      template: benchmark_eval
      enabled: true
      repeatable: false

    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true

  loop:
    mode: fixed
    max_cycles: 2
    enabled: true
    stop_when_no_unresolved: true

  safety:
    max_consecutive_failures: 3
    auto_rollback: true
    checkpoint_strategy: git_tag
