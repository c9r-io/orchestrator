# Benchmark agent: Codex CLI shell + gpt-5.4 model
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: bench-codex-gpt54
  description: "Codex CLI + gpt-5.4"
spec:
  capabilities:
    - plan
    - implement
    - qa_testing
    - qa_doc_gen
    - ticket_fix
    - align_tests
    - self_test
  command: codex exec "{prompt}" -m gpt-5.4 --full-auto
  promptDelivery: arg
  env:
    - fromRef: openai-gpt54mini
  metadata:
    benchmark_shell: "codex"
    benchmark_model: "gpt-5.4"
