# Benchmark agent: Gemini CLI shell + gemini-3-flash-preview model
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: bench-gemini-flash
  description: "Gemini CLI + gemini-3-flash-preview"
spec:
  capabilities:
    - plan
    - implement
    - qa_testing
    - qa_doc_gen
    - ticket_fix
    - align_tests
    - self_test
  command: gemini -p "{prompt}" -m gemini-3-flash-preview -o json
  promptDelivery: arg
  env:
    - fromRef: gemini-flash
  metadata:
    benchmark_shell: "gemini-cli"
    benchmark_model: "gemini-3-flash-preview"
