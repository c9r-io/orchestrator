# Benchmark agent: Codex CLI shell + GPT-4o model
# Requires: codex CLI installed (https://github.com/openai/codex)
# Template: adjust command flags to match your codex CLI version.
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: bench-codex-gpt4o
  description: "Codex CLI + GPT-4o"
spec:
  capabilities:
    - plan
    - implement
    - qa_testing
    - qa_doc_gen
    - ticket_fix
    - align_tests
    - self_test
  command: codex -q "{prompt}" --full-auto
  promptDelivery: arg
  env:
    - fromRef: openai-gpt4o
  metadata:
    benchmark_shell: "codex"
    benchmark_model: "gpt-4o"
