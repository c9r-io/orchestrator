apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: test_agent
spec:
  metadata:
    cost: 50
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.88,\"quality_score\":0.84,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"cycle\",\"description\":\"cycle {cycle}\",\"severity\":\"info\"}]}]}'"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"guard-check\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: repeat_test
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
  loop:
    mode: infinite
    max_cycles: 3
