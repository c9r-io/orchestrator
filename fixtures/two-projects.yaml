runner:
  shell: /bin/bash
  shell_arg: "-lc"
resume:
  auto: false
defaults:
  project: project-a
  workspace: ws1
  workflow: qa_only
projects:
  project-a:
    workspaces:
      ws1:
        root_path: /tmp/pa
        qa_targets:
          - docs/qa
        ticket_dir: docs/ticket
    agents:
      pa_agent:
        capabilities:
          - qa
        templates:
          qa: "echo 'qa-project-a'"
    workflows: {}
  project-b:
    workspaces:
      ws2:
        root_path: /tmp/pb
        qa_targets:
          - docs/qa
        ticket_dir: docs/ticket
    agents:
      pb_agent:
        capabilities:
          - qa
        templates:
          qa: "echo 'qa-project-b'"
    workflows: {}
workspaces: {}
agents: {}
workflows:
  qa_only:
    steps:
      - id: qa
        required_capability: qa
        enabled: true
        repeatable: false
    loop:
      mode: once
      guard:
        enabled: false
        stop_when_no_unresolved: false
    finalize:
      rules: []
