apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: ws1
  project: project-a
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: ws2
  project: project-b
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: pa_agent
  project: project-a
spec:
  capabilities:
    - qa
  command: "echo '{\"confidence\":0.86,\"quality_score\":0.82,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-project-a\",\"description\":\"qa project a\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: pb_agent
  project: project-b
spec:
  capabilities:
    - qa
  command: "echo '{\"confidence\":0.85,\"quality_score\":0.8,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-project-b\",\"description\":\"qa project b\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_only
spec:
  steps:
    - id: qa
      type: qa
      required_capability: qa
      enabled: true
      repeatable: false
  loop:
    mode: once
