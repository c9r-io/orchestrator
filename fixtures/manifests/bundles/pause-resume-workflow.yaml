apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_sleep
spec:
  capabilities:
    - qa
  templates:
    qa: "sleep 15 && echo '{\"confidence\":0.9,\"quality_score\":0.86,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-sleep\",\"description\":\"qa after sleep for target-file\",\"severity\":\"info\"}]}]}'"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_sleep
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
