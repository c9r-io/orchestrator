apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: docs/ticket
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_write
spec:
  mode: sandbox
  fs_mode: workspace_rw_scoped
  writable_paths:
    - docs
  network_mode: deny
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: host
spec:
  mode: host
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_docs_only
spec:
  mode: sandbox
  fs_mode: workspace_rw_scoped
  writable_paths:
    - docs
  network_mode: deny
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_fd_limit
spec:
  mode: sandbox
  fs_mode: workspace_readonly
  network_mode: deny
  max_open_files: 16
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_cpu_limit
spec:
  mode: sandbox
  fs_mode: workspace_readonly
  network_mode: deny
  max_cpu_seconds: 1
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_memory_limit
spec:
  mode: sandbox
  fs_mode: workspace_readonly
  network_mode: deny
  max_memory_mb: 256
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_process_limit
spec:
  mode: sandbox
  fs_mode: workspace_readonly
  network_mode: deny
  max_processes: 1
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_network_deny
spec:
  mode: sandbox
  fs_mode: workspace_readonly
  network_mode: deny
---
apiVersion: orchestrator.dev/v2
kind: ExecutionProfile
metadata:
  name: sandbox_network_allowlist
spec:
  mode: sandbox
  fs_mode: workspace_readonly
  network_mode: allowlist
  network_allowlist:
    - example.com:443
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: impl-agent
spec:
  capabilities:
    - exec_profile_implement
  command: "echo '{\"confidence\":0.9,\"quality_score\":0.9,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: qa-agent
spec:
  capabilities:
    - exec_profile_qa_testing
  command: "echo '{\"confidence\":0.9,\"quality_score\":0.9,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: sandbox-writer-root-deny
spec:
  capabilities:
    - sandbox_write_root_deny
  command: "exec ./target/debug/orchestrator debug sandbox-probe write-file --path sandbox-denied.txt --contents blocked"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: sandbox-writer-docs-allow
spec:
  capabilities:
    - sandbox_write_docs_allow
  command: "exec ./target/debug/orchestrator debug sandbox-probe write-file --path docs/sandbox-allowed.txt --contents allowed"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: fd-burner
spec:
  capabilities:
    - sandbox_fd_probe
  command: "exec ./target/debug/orchestrator debug sandbox-probe open-files --count 256"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: cpu-burner
spec:
  capabilities:
    - sandbox_cpu_probe
  command: "exec ./target/debug/orchestrator debug sandbox-probe cpu-burn"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: memory-burner
spec:
  capabilities:
    - sandbox_memory_probe
  command: "exec ./target/debug/orchestrator debug sandbox-probe alloc-memory --chunk-mb 16 --total-mb 1024"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: process-burner
spec:
  capabilities:
    - sandbox_process_probe
  command: "exec ./target/debug/orchestrator debug sandbox-probe spawn-children --count 8 --sleep-secs 60"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: net-probe
spec:
  capabilities:
    - sandbox_network_probe
  command: "exec ./target/debug/orchestrator debug sandbox-probe dns-resolve --host example.com --port 443"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: noop-agent
spec:
  capabilities:
    - sandbox_allowlist_probe
  command: "echo '{\"confidence\":0.9,\"quality_score\":0.9,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: exec-profile-mixed
spec:
  steps:
    - id: implement
      type: implement
      required_capability: exec_profile_implement
      execution_profile: sandbox_write
      enabled: true
      scope: task
    - id: qa_testing
      type: qa_testing
      required_capability: exec_profile_qa_testing
      execution_profile: host
      enabled: true
      scope: item
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-deny-root-write
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_write_root_deny
      execution_profile: sandbox_docs_only
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-allow-docs-write
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_write_docs_allow
      execution_profile: sandbox_docs_only
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-open-files-limit
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_fd_probe
      execution_profile: sandbox_fd_limit
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-network-deny
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_network_probe
      execution_profile: sandbox_network_deny
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-cpu-limit
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_cpu_probe
      execution_profile: sandbox_cpu_limit
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-memory-limit
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_memory_probe
      execution_profile: sandbox_memory_limit
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-process-limit
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_process_probe
      execution_profile: sandbox_process_limit
      enabled: true
      scope: task
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: sandbox-network-allowlist
spec:
  steps:
    - id: implement
      type: implement
      required_capability: sandbox_allowlist_probe
      execution_profile: sandbox_network_allowlist
      enabled: true
      scope: task
  loop:
    mode: once
