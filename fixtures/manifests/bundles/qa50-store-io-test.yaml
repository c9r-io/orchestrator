# QA-50: Store I/O and Invariant Test Fixtures
# Tests: store_inputs, store_outputs, PostAction::StorePut, invariants
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: qa50-ws
spec:
  root_path: "."
  qa_targets:
    - fixtures/wp05-qa
  ticket_dir: fixtures/ticket
  self_referential: false
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: qa50_mock_agent
spec:
  capabilities:
    - plan
    - implement
    - loop_guard
  command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[],\"qa_score\":\"passed:98%\",\"bench_result\":{\"test_count\":1419,\"pass_rate\":1.0}}'"
---
# S1/S2: store_inputs with required key MISSING (should fail step)
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa50-store-inputs-required
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95}'"
      store_inputs:
        - store: results
          key: mandatory_config
          as_var: config_json
          required: true
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
---
# S1: store_inputs with optional key PRESENT (should inject var)
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa50-store-inputs-optional
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95}'"
      store_inputs:
        - store: metrics
          key: baseline_score
          as_var: prev_score
          required: false
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
---
# S3: store_outputs writes pipeline vars after step
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa50-store-outputs
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95,\"qa_score\":\"passed:98%\"}'"
      store_outputs:
        - store: metrics
          key: qa_result
          from_var: qa_score
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
---
# S4: PostAction::StorePut writes to store
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa50-store-put-action
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95,\"bench_result\":{\"test_count\":1419,\"pass_rate\":1.0}}'"
      behavior:
        collect_artifacts: true
        post_actions:
          - type: store_put
            store: benchmarks
            key: latest_run
            from_var: bench_result
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
---
# S5: Invariant violation halts execution
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa50-invariant-halt
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95}'"
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
    invariants:
      - name: quality_gate
        description: "Always fails"
        command: "exit 1"
        expect_exit: 0
        check_at: [before_complete]
        on_violation: halt
        immutable: true