# Test workflow for S3: correct YAML (no warning)
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: test-s3
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo
spec:
  capabilities:
    - qa
    - fix
  command: "echo '{\"confidence\":0.93}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: test_s3_correct
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
      behavior:
        captures:
          - var: test_var
            source: stdout
            json_path: "$.test"
    - id: self_test
      type: self_test
      enabled: true
      scope: task
  loop:
    mode: once
  safety:
    auto_rollback: true
    checkpoint_strategy: git_tag
    binary_snapshot: true
