# Test fixture: generate_items regression narrowing
# Verifies that generate_items post-action creates dynamic items from
# qa_doc_gen output, and that item-scoped steps (qa_testing) only process
# the dynamic subset — not all 5 static items.
#
# Static items (from qa_targets):
#   fixtures/qa-narrow-test/target-a.md
#   fixtures/qa-narrow-test/target-b.md
#   fixtures/qa-narrow-test/static-skip-1.md
#   fixtures/qa-narrow-test/static-skip-2.md
#   fixtures/qa-narrow-test/static-skip-3.md
#
# qa_doc_gen mock outputs regression_targets pointing to only target-a and target-b.
# generate_items (replace: true) should create 2 dynamic items, replacing 5 static.
# qa_testing should then fan out over only those 2 items.
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: narrow-test-ws
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa-narrow-test
  ticket_dir: fixtures/ticket
  self_referential: false
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_architect
  description: "Mock architect — outputs regression_targets JSON for generate_items"
spec:
  capabilities:
    - plan
    - qa_doc_gen
  command: >-
    printf '%s' '{"confidence":0.95,"quality_score":0.9,"artifacts":[],"regression_targets":[{"id":"fixtures/qa-narrow-test/target-a.md","name":"target-a"},{"id":"fixtures/qa-narrow-test/target-b.md","name":"target-b"}]}'
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_tester
  description: "Mock tester — echoes success JSON for qa_testing"
spec:
  capabilities:
    - qa_testing
    - loop_guard
  command: "echo '{\"confidence\":0.92,\"quality_score\":0.88,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: narrow-test
spec:
  max_parallel: 4

  steps:
    # ── Task segment: plan + qa_doc_gen ──
    - id: plan
      type: plan
      scope: task
      required_capability: plan
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"

    - id: qa_doc_gen
      type: qa_doc_gen
      scope: task
      required_capability: qa_doc_gen
      enabled: true
      repeatable: false
      behavior:
        post_actions:
          - type: generate_items
            from_var: qa_doc_gen_output
            json_path: "$.regression_targets"
            mapping:
              item_id: "$.id"
              label: "$.name"
            replace: true

    # ── Item segment: qa_testing (fans out per item) ──
    - id: qa_testing
      type: qa_testing
      scope: item
      required_capability: qa_testing
      enabled: true
      repeatable: true

    # ── Loop guard ──
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard

  loop:
    mode: fixed
    max_cycles: 1
    enabled: true

  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
