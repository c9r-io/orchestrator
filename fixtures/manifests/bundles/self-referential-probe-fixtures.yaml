apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: self_ref_probe_ws
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa-probe-targets
  ticket_dir: fixtures/ticket
  self_referential: true
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: self_ref_probe_fallback
spec:
  capabilities:
    - plan
    - implement
    - qa
    - align_tests
    - doc_governance
  command: "echo 'plan fallback'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: self_ref_probe_runtime_control
spec:
  steps:
    - id: implement
      type: implement
      enabled: true
      command: "bash -lc 'for i in 1 2 3 4; do echo runtime-tick-$i; sleep 15; done'"
    - id: self_test
      type: self_test
      enabled: true
      builtin: self_test
  loop:
    mode: once
  safety:
    auto_rollback: true
    checkpoint_strategy: git_tag
    profile: self_referential_probe
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: self_ref_probe_low_output
spec:
  steps:
    - id: implement
      type: implement
      enabled: true
      command: "bash -lc 'sleep 125'"
    - id: self_test
      type: self_test
      enabled: true
      builtin: self_test
  loop:
    mode: once
  safety:
    auto_rollback: true
    checkpoint_strategy: git_tag
    profile: self_referential_probe
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: self_ref_probe_active_output
spec:
  steps:
    - id: implement
      type: implement
      enabled: true
      command: "bash -lc 'for i in 1 2 3 4; do printf \"active-output-%02d-abcdefghijklmnopqrstuvwxyz0123456789\\n\" \"$i\"; sleep 30; done'"
    - id: self_test
      type: self_test
      enabled: true
      builtin: self_test
  loop:
    mode: once
  safety:
    auto_rollback: true
    checkpoint_strategy: git_tag
    profile: self_referential_probe
