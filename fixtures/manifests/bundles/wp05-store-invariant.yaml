# WP05 Layer 1-B: Store + Invariants (WP01 x WP04)
# Invariant violation halts a task; pass path completes normally.
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: wp05-ws
spec:
  root_path: "."
  qa_targets:
    - fixtures/wp05-qa
  ticket_dir: fixtures/ticket
  self_referential: false
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: wp05_mock_agent
spec:
  capabilities:
    - plan
    - implement
    - loop_guard
  command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
---
# Workflow where invariant FAILS (command exits 1)
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: wp05-store-invariant-fail
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
    invariants:
      - name: quality_gate
        description: "Simulated test failure — exit 1 triggers violation"
        command: "exit 1"
        expect_exit: 0
        check_at: [before_complete]
        on_violation: halt
        immutable: true
---
# Workflow where invariant PASSES (command exits 0)
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: wp05-store-invariant-pass
spec:
  steps:
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
    invariants:
      - name: quality_gate
        description: "Simulated test pass — exit 0"
        command: "exit 0"
        expect_exit: 0
        check_at: [before_complete]
        on_violation: halt
        immutable: true
