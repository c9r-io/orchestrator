apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_fail
spec:
  capabilities:
    - qa
    - fix
  templates:
    qa: "echo '{\"confidence\":0.35,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"high\",\"category\":\"regression\",\"content\":{\"title\":\"qa-failed\",\"qa_file\":\"target-file\"}}]}' && exit 1"
    fix: "echo '{\"confidence\":0.81,\"quality_score\":0.77,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"auto-fix.patch\"]}]}' && exit 0"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_only_fail
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
