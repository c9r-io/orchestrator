apiVersion: orchestrator.dev/v1
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: mock_fail
spec:
  capabilities:
    - qa
    - fix
  templates:
    qa: "echo 'QA failed' && exit 1"
    fix: "echo 'Fix attempted' && exit 0"
    loop_guard: "echo 'continue'"
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: qa_only_fail
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
