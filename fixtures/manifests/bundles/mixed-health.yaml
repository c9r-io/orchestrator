apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo
spec:
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.91,\"quality_score\":0.88,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"echo-qa\",\"description\":\"echo qa for target-file\",\"severity\":\"info\"}]}]}'"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_fail
spec:
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.35,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"high\",\"category\":\"regression\",\"content\":{\"title\":\"qa-failed\",\"qa_file\":\"target-file\"}}]}' && exit 1"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: health_test
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
  loop:
    mode: infinite
    max_cycles: 3
