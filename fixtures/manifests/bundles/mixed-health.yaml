apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo
spec:
  capabilities:
    - qa
    - loop_guard
  command: "echo '{\"confidence\":0.91,\"quality_score\":0.88,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"echo-qa\",\"description\":\"echo qa for target-file\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_fail
spec:
  capabilities:
    - qa
  command: "echo 'INVALID_JSON_not_a_valid_output'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: health_test
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
  loop:
    mode: infinite
    max_cycles: 3
