apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_three_phase
spec:
  capabilities:
    - qa
    - fix
    - retest
  command: "echo '{\"confidence\":0.33,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"high\",\"category\":\"regression\",\"content\":{\"title\":\"three-phase-qa-fail\",\"qa_file\":\"target-file\"}}]}' && exit 1"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_fix_retest_forced
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
    - id: ticket_scan
      type: ticket_scan
      enabled: true
    - id: fix
      type: fix
      enabled: true
    - id: retest
      type: retest
      enabled: true
  loop:
    mode: once
