apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_three_phase
spec:
  capabilities:
    - qa
    - fix
    - retest
  templates:
    qa: "echo '{\"confidence\":0.33,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"high\",\"category\":\"regression\",\"content\":{\"title\":\"three-phase-qa-fail\",\"qa_file\":\"target-file\"}}]}' && exit 1"
    fix: "echo '{\"confidence\":0.84,\"quality_score\":0.8,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"target-file\"]}]}' && exit 0"
    retest: "echo '{\"confidence\":0.9,\"quality_score\":0.88,\"artifacts\":[{\"kind\":\"test_result\",\"passed\":1,\"failed\":0}]}' && exit 0"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_fix_retest_forced
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
    - id: ticket_scan
      type: ticket_scan
      enabled: true
    - id: fix
      type: fix
      enabled: true
    - id: retest
      type: retest
      enabled: true
  loop:
    mode: once
