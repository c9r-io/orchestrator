apiVersion: orchestrator.dev/v1
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa-capability-test
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: agent_qa_only
spec:
  metadata:
    cost: 30
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.4,\"quality_score\":0.25,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"high\",\"category\":\"capability\",\"content\":{\"title\":\"qa-from-agent-qa-only\"}}]}' && exit 1"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: agent_fix_only
spec:
  metadata:
    cost: 50
  capabilities:
    - fix
  templates:
    fix: "echo '{\"confidence\":0.8,\"quality_score\":0.76,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"fix-from-agent-fix-only.patch\"]}]}'"
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: test_capability
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
    - id: run_fix
      type: fix
      enabled: true
  loop:
    mode: once
