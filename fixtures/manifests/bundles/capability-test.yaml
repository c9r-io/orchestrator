apiVersion: orchestrator.dev/v1
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa-capability-test
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: agent_qa_only
spec:
  metadata:
    cost: 30
  capabilities:
    - qa
  templates:
    qa: "echo 'qa-from-agent-qa-only' && exit 1"
    loop_guard: "echo 'continue'"
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: agent_fix_only
spec:
  metadata:
    cost: 50
  capabilities:
    - fix
  templates:
    fix: "echo 'fix-from-agent-fix-only'"
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: test_capability
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
    - id: run_fix
      type: fix
      enabled: true
  loop:
    mode: once
