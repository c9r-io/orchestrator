apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo_alpha
spec:
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.9,\"quality_score\":0.86,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"alpha-qa\",\"description\":\"alpha qa for target-file\",\"severity\":\"info\"}]}]}'"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo_beta
spec:
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.89,\"quality_score\":0.85,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"beta-qa\",\"description\":\"beta qa for target-file\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: multi_agent_qa
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
