apiVersion: orchestrator.dev/v1
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: mock_echo
spec:
  capabilities:
    - qa
    - fix
    - retest
  templates:
    qa: "echo 'qa-phase: {rel_path}'"
    fix: "echo 'fix-phase: {ticket_paths}'"
    retest: "echo 'retest-phase: {rel_path}'"
    loop_guard: "echo 'continue'"
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: qa_only
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: qa_fix
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
    - id: ticket_scan
      type: ticket_scan
      enabled: true
    - id: fix
      type: fix
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: qa_fix_retest
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
    - id: ticket_scan
      type: ticket_scan
      enabled: true
    - id: fix
      type: fix
      enabled: true
    - id: retest
      type: retest
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: loop_test
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
  loop:
    mode: infinite
    max_cycles: 3
