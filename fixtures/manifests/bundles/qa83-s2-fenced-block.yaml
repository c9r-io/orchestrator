# Test fixture: generate_items - Fenced Code Block (Scenario 2)
# Tests extraction from JSON inside markdown triple backticks
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: s2-fenced-block-test
spec:
  root_path: "."
  qa_targets:
    - fixtures/qa-narrow-test
  ticket_dir: fixtures/ticket
  self_referential: false
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_architect
  description: "Mock architect — outputs JSON in fenced code block"
spec:
  capabilities:
    - plan
    - qa_doc_gen
  command: "printf '%s' 'Here are the regression targets:\n\n```json\n{\n  \"regression_targets\": [\n    {\"id\": \"doc-a\", \"name\": \"Doc A\"},\n    {\"id\": \"doc-b\", \"name\": \"Doc B\"},\n    {\"id\": \"doc-c\", \"name\": \"Doc C\"}\n  ]\n}\n```'"
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_tester
  description: "Mock tester — echoes success JSON for qa_testing"
spec:
  capabilities:
    - qa_testing
    - loop_guard
  command: "echo '{\"confidence\":0.92,\"quality_score\":0.88,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: s2-fenced-block
spec:
  max_parallel: 4

  steps:
    - id: plan
      type: plan
      scope: task
      required_capability: plan
      enabled: true
      repeatable: false
      command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"

    - id: qa_doc_gen
      type: qa_doc_gen
      scope: task
      required_capability: qa_doc_gen
      enabled: true
      repeatable: false
      behavior:
        post_actions:
          - type: generate_items
            from_var: qa_doc_gen_output
            json_path: "$.regression_targets"
            mapping:
              item_id: "$.id"
              label: "$.name"
            replace: true

    - id: qa_testing
      type: qa_testing
      scope: item
      required_capability: qa_testing
      enabled: true
      repeatable: true

    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard

  loop:
    mode: fixed
    max_cycles: 1
    enabled: true

  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
