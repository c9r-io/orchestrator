# WP05 Layer 2-A: Store + Items + Selection (WP01 x WP03)
# Winner metrics persisted to store; spawned child reads stored winner data.
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: wp05-ws
spec:
  root_path: "."
  qa_targets:
    - fixtures/wp05-qa
  ticket_dir: fixtures/ticket
  self_referential: false
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: wp05_mock_agent
spec:
  capabilities:
    - plan
    - implement
    - qa_testing
    - loop_guard
    - evaluate
  command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: wp05-store-items-select
spec:
  max_parallel: 3
  steps:
    # Generate 2 candidates
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[],\"candidates\":[{\"id\":\"alpha\",\"name\":\"alpha-approach\"},{\"id\":\"beta\",\"name\":\"beta-approach\"}]}'"
      behavior:
        post_actions:
          - type: generate_items
            from_var: plan_output
            json_path: "$.candidates"
            mapping:
              item_id: "$.id"
              label: "$.name"
            replace: true

    # Item-scoped benchmark
    - id: benchmark
      type: qa_testing
      scope: item
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
      behavior:
        captures:
          - var: score
            source: exit_code

    # Select best
    - id: select_best
      type: item_select
      scope: task
      enabled: true
      repeatable: false
      item_select_config:
        strategy: max
        metric_var: score
        store_result:
          namespace: evolution
          key: winner_latest

    # Record results to store + spawn verification child
    - id: record
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
      behavior:
        post_actions:
          - type: store_put
            store: journal
            key: run_latest
            from_var: item_select_winner
          - type: spawn_task
            goal: "verify-winner-store-read"
            workflow: wp05-verify-winner

    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
    max_spawned_tasks: 5
    max_spawn_depth: 3
---
# Child workflow: reads winner from store
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: wp05-verify-winner
spec:
  steps:
    - id: implement
      type: implement
      scope: task
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.9,\"quality_score\":0.85,\"artifacts\":[]}'"
      store_inputs:
        - store: evolution
          key: winner_latest
          as_var: prev_winner
        - store: journal
          key: run_latest
          as_var: journal_entry
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
