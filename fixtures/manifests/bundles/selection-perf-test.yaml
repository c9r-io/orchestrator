apiVersion: orchestrator.dev/v1
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: fast_agent
spec:
  metadata:
    cost: 20
  capabilities:
    - qa
    - fix
  templates:
    qa: "echo '{\"confidence\":0.9,\"quality_score\":0.82,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"fast-qa\",\"description\":\"fast qa agent\",\"severity\":\"info\"}]}]}'"
    fix: "echo '{\"confidence\":0.82,\"quality_score\":0.76,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"fast-fix.out\"]}]}'"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: quality_agent
spec:
  metadata:
    cost: 80
  capabilities:
    - qa
    - fix
  templates:
    qa: "echo '{\"confidence\":0.95,\"quality_score\":0.94,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"quality-qa\",\"description\":\"quality qa agent\",\"severity\":\"info\"}]}]}'"
    fix: "echo '{\"confidence\":0.91,\"quality_score\":0.89,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"quality-fix.out\"]}]}'"
---
apiVersion: orchestrator.dev/v1
kind: Workflow
metadata:
  name: selection_test
spec:
  steps:
    - id: do_qa
      type: qa
      enabled: true
    - id: do_fix
      type: fix
      enabled: true
  loop:
    mode: once
