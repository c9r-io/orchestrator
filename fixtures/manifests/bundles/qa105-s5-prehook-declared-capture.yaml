# Test workflow for S5: prehook references declared capture variable (no warning)
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: test-s5
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo
spec:
  capabilities:
    - qa
    - fix
  command: "echo '{\"confidence\":0.93}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: test_s5_prehook_declared
spec:
  steps:
    - id: step_a
      type: qa
      enabled: true
      behavior:
        captures:
          - var: regression_target_ids
            source: stdout
            json_path: "$.targets[*].id"
    - id: step_b
      type: fix
      enabled: true
      prehook:
        engine: cel
        when: "size(regression_target_ids) > 0"
        # References declared capture variable - should NOT warn
    - id: self_test
      type: self_test
      enabled: true
      scope: task
  loop:
    mode: once
  safety:
    auto_rollback: true
    checkpoint_strategy: git_tag
    binary_snapshot: true
