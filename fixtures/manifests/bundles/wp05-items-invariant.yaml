# WP05 Layer 1-D: Dynamic Items + Invariants (WP03 x WP04)
# Invariant fires after implement, blocking bad candidates before selection.
---
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: wp05-ws
spec:
  root_path: "."
  qa_targets:
    - fixtures/wp05-qa
  ticket_dir: fixtures/ticket
  self_referential: false
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: wp05_mock_agent
spec:
  capabilities:
    - plan
    - implement
    - qa_testing
    - loop_guard
  command: "echo '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: wp05-items-invariant
spec:
  max_parallel: 3
  steps:
    # Generate 2 candidates: good and bad
    - id: plan
      type: plan
      scope: task
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.95,\"quality_score\":0.9,\"artifacts\":[],\"candidates\":[{\"id\":\"good\",\"name\":\"good-candidate\"},{\"id\":\"bad\",\"name\":\"bad-candidate\"}]}'"
      behavior:
        post_actions:
          - type: generate_items
            from_var: plan_output
            json_path: "$.candidates"
            mapping:
              item_id: "$.id"
              label: "$.name"
            replace: true

    # Item-scoped implement step (both succeed)
    - id: implement
      type: implement
      scope: item
      enabled: true
      repeatable: false
      command: "printf '%s' '{\"confidence\":0.9,\"quality_score\":0.85,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"src/lib.rs\"]}]}'"

    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard
  loop:
    mode: fixed
    max_cycles: 1
    enabled: true
  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: none
    invariants:
      - name: quality_gate
        description: "All tests must pass after implement"
        command: "exit 0"
        expect_exit: 0
        check_at: [before_complete]
        on_violation: halt
        immutable: true
