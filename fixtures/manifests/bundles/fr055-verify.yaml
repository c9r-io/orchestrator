apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: stagger-verify
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: verify_echo
spec:
  capabilities:
    - qa
  command: "echo '{\"confidence\":0.9,\"quality_score\":0.9,\"artifacts\":[]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: stagger_verify
spec:
  max_parallel: 2
  stagger_delay_ms: 2000
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
