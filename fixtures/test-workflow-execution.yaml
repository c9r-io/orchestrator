apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: mock_echo
spec:
  capabilities:
    - qa
    - fix
    - retest
    - loop_guard
  command: "echo '{\"confidence\":0.93,\"quality_score\":0.9,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-pass\",\"description\":\"qa passed for target-file\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_only
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_fix
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
    - id: ticket_scan
      type: ticket_scan
      enabled: true
    - id: fix
      type: fix
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_fix_retest
spec:
  steps:
    - id: qa
      type: qa
      enabled: true
    - id: ticket_scan
      type: ticket_scan
      enabled: true
    - id: fix
      type: fix
      enabled: true
    - id: retest
      type: retest
      enabled: true
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: loop_test
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
  loop:
    mode: infinite
    max_cycles: 3
