runner:
  shell: /bin/bash
  shell_arg: "-lc"
resume:
  auto: false
defaults:
  project: default
  workspace: default
  workflow: qa_only
projects: {}
workspaces:
  default:
    root_path: "."
    qa_targets:
      - docs/qa/orchestrator
    ticket_dir: docs/ticket
agents:
  mock_echo:
    metadata:
      name: mock_echo
    capabilities:
      - qa
      - fix
      - retest
    templates:
      qa: "echo '{\"confidence\":0.93,\"quality_score\":0.9,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-pass\",\"description\":\"qa passed for target-file\",\"severity\":\"info\"}]}]}'"
      fix: "echo '{\"confidence\":0.84,\"quality_score\":0.8,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"target-file\"]}]}'"
      retest: "echo '{\"confidence\":0.9,\"quality_score\":0.88,\"artifacts\":[{\"kind\":\"test_result\",\"passed\":1,\"failed\":0}]}'"
  mock_fail:
    metadata:
      name: mock_fail
    capabilities:
      - qa
      - fix
    templates:
      qa: "echo '{\"confidence\":0.35,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"high\",\"category\":\"regression\",\"content\":{\"title\":\"qa-failed\",\"qa_file\":\"target-file\"}}]}' && exit 1"
      fix: "echo '{\"confidence\":0.81,\"quality_score\":0.77,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"auto-fix.patch\"]}]}' && exit 0"
workflows:
  qa_only:
    steps:
      - id: qa
        type: qa
        required_capability: qa
        enabled: true
        repeatable: true
        is_guard: false
    loop:
      mode: once
      guard:
        enabled: false
        stop_when_no_unresolved: false
  qa_fix:
    steps:
      - id: qa
        type: qa
        required_capability: qa
        enabled: true
        repeatable: true
        is_guard: false
      - id: ticket_scan
        type: ticket_scan
        enabled: true
        repeatable: true
        is_guard: false
      - id: fix
        type: fix
        required_capability: fix
        enabled: true
        repeatable: true
        is_guard: false
    loop:
      mode: once
      guard:
        enabled: false
        stop_when_no_unresolved: false
  qa_fix_retest:
    steps:
      - id: qa
        type: qa
        required_capability: qa
        enabled: true
        repeatable: true
        is_guard: false
      - id: ticket_scan
        type: ticket_scan
        enabled: true
        repeatable: true
        is_guard: false
      - id: fix
        type: fix
        required_capability: fix
        enabled: true
        repeatable: true
        is_guard: false
      - id: retest
        type: retest
        required_capability: retest
        enabled: true
        repeatable: true
        is_guard: false
    loop:
      mode: once
      guard:
        enabled: false
        stop_when_no_unresolved: false
  loop_test:
    steps:
      - id: run_qa
        type: qa
        required_capability: qa
        enabled: true
        repeatable: true
        is_guard: false
    loop:
      mode: infinite
      guard:
        enabled: false
        stop_when_no_unresolved: false
        max_cycles: 3
