runner:
  shell: /bin/bash
  shell_arg: -lc
resume:
  auto: false
defaults:
  workspace: default
  workflow: test_capability
workspaces:
  default:
    root_path: .
    qa_targets:
      - docs/qa
    ticket_dir: docs/ticket
agents:
  agent_qa_only:
    metadata:
      name: agent_qa_only
      cost: 30
    capabilities:
    - qa
    templates:
      qa: "echo '{\"confidence\":0.58,\"quality_score\":0.52,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-from-agent-qa-only\",\"description\":\"capability qa only agent\",\"severity\":\"info\"}]}]}'"

  agent_fix_only:
    metadata:
      name: agent_fix_only
      cost: 50
    capabilities:
    - fix
    templates:
      fix: "echo '{\"confidence\":0.8,\"quality_score\":0.76,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"fix-from-agent-fix-only.patch\"]}]}'"

workflows:
  test_capability:
    steps:
    - id: run_qa
      required_capability: qa
      enabled: true
      repeatable: false

    - id: run_fix
      required_capability: fix
      enabled: true
      repeatable: false

    loop:
      mode: once
      guard:
        enabled: false
        stop_when_no_unresolved: false
