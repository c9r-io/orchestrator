apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: fixtures/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: test_agent
spec:
  metadata:
    cost: 50
  capabilities:
    - qa
    - loop_guard
  command: "echo '{\"confidence\":0.9,\"quality_score\":0.88,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-run\",\"description\":\"guard test qa run\",\"severity\":\"info\"}]}]}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: guard_test
spec:
  steps:
    - id: run_qa
      type: qa
      enabled: true
    - id: check_stop
      type: loop_guard
      enabled: true
  loop:
    mode: infinite
    max_cycles: 3
