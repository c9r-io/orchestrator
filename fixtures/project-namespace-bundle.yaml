apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa/orchestrator
  ticket_dir: docs/ticket
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: global_agent
spec:
  metadata:
    name: global_agent
  capabilities:
    - qa
    - fix
    - retest
  templates:
    qa: "echo '{\"confidence\":0.9,\"quality_score\":0.88,\"artifacts\":[{\"kind\":\"analysis\",\"findings\":[{\"title\":\"qa-global\",\"description\":\"project namespace qa global\",\"severity\":\"info\"}]}]}'"
    fix: "echo '{\"confidence\":0.82,\"quality_score\":0.79,\"artifacts\":[{\"kind\":\"code_change\",\"files\":[\"fix-global.patch\"]}]}'"
    retest: "echo '{\"confidence\":0.9,\"quality_score\":0.87,\"artifacts\":[{\"kind\":\"test_result\",\"passed\":1,\"failed\":0}]}'"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: test_capability
spec:
  steps:
    - id: qa
      type: qa
      required_capability: qa
      enabled: true
      repeatable: false
  loop:
    mode: once
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: qa_fix_retest
spec:
  steps:
    - id: qa
      type: qa
      required_capability: qa
      enabled: true
      repeatable: false
    - id: ticket_scan
      type: ticket_scan
      enabled: true
      repeatable: false
    - id: fix
      type: fix
      required_capability: fix
      enabled: true
      repeatable: false
    - id: retest
      type: retest
      required_capability: retest
      enabled: false
      repeatable: false
  loop:
    mode: once
    guard:
      enabled: false
      stop_when_no_unresolved: false
