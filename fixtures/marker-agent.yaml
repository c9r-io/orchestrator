apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: marker-agent
spec:
  metadata:
    cost: 10
  capabilities:
    - qa
  command: "echo '{\"confidence\":0.3,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"critical\",\"category\":\"security\",\"content\":{\"title\":\"security-ticket\"}}]}' && exit 1"
