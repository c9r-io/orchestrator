apiVersion: orchestrator.dev/v1
kind: Agent
metadata:
  name: marker-agent
spec:
  metadata:
    cost: 10
  capabilities:
    - qa
  templates:
    qa: "echo '{\"confidence\":0.3,\"quality_score\":0.2,\"artifacts\":[{\"kind\":\"ticket\",\"severity\":\"critical\",\"category\":\"security\",\"content\":{\"title\":\"security-ticket\"}}]}' && exit 1"
    loop_guard: "echo '{\"continue\":true,\"should_stop\":false,\"reason\":\"continue\"}'"
