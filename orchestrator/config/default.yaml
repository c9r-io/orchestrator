runner:
  shell: /bin/bash
  shell_arg: -lc
resume:
  auto: false
defaults:
  project: default
  workspace: default
  workflow: basic
projects: {}
workspaces:
  default:
    root_path: /Volumes/Yotta/ai_native_sdlc/orchestrator
    qa_targets:
    - docs/qa
    ticket_dir: docs/ticket
agents:
  echo:
    metadata:
      name: echo
      description: Echo agent for testing
      version: null
      cost: 1
    capabilities:
    - qa
    templates:
      qa: 'echo ''qa: {rel_path}'''
    selection:
      strategy: cost_based
      weights: null
workflows:
  basic:
    steps:
    - id: run_qa
      type: qa
      required_capability: qa
      enabled: true
      repeatable: false
      is_guard: false
    loop:
      mode: once
      guard:
        enabled: false
        stop_when_no_unresolved: false
        max_cycles: null
    finalize:
      rules: []
    qa: null
    fix: null
    retest: null
