# Claude 原生模型配置（按能力分层）
# 当需要切换到代理 API 时，apply minimax-secret.yaml 即可覆盖 ANTHROPIC_MODEL。
---
apiVersion: orchestrator.dev/v2
kind: SecretStore
metadata:
  name: claude-opus
spec:
  data:
    ANTHROPIC_MODEL: "claude-opus-4-6"
---
apiVersion: orchestrator.dev/v2
kind: SecretStore
metadata:
  name: claude-sonnet
spec:
  data:
    ANTHROPIC_MODEL: "claude-sonnet-4-6"
---
apiVersion: orchestrator.dev/v2
kind: SecretStore
metadata:
  name: claude-haiku
spec:
  data:
    ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
