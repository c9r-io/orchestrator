apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: self
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
  self_referential: true
---
# Architect agent (MiniMax-M2.5-highspeed) — planning and QA doc design
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: architect
  description: "MiniMax-M2.5-highspeed-powered architect agent — planning and QA doc generation"
spec:
  capabilities:
    - plan
    - qa_doc_gen
  templates:
    # Plan: arch-guidance + rust-conventions, outputs implementation plan
    plan: >-
      opencode run
      "You are working on the Agent Orchestrator project at {source_tree}.
      Your goal: {goal}.

      Use /arch-guidance — read docs/architecture.md first.
      Use /rust-conventions for coding patterns.

      Create a detailed implementation plan:
      1. Identify which files need changes
      2. Design the approach with minimal blast radius
      3. Consider test strategy (unit tests required for all new logic)
      4. Output the plan as structured text

      Current diff in this cycle: {diff}"
      --model minimax-coding-plan/MiniMax-M2.5-highspeed

    # QA doc generation: produce executable QA test documents from the plan
    qa_doc_gen: >-
      opencode run
      "/qa-doc-gen

      Project: {source_tree}
      Plan:
      {plan_output}

      Generate executable QA test documents for the planned changes.
      Place them under docs/qa/ following existing conventions."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed
---
# Coder agent (MiniMax-M2.5-highspeed) — code generation, fixing, and test alignment
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: coder
  description: "MiniMax-M2.5-highspeed-powered coder agent — implementation, ticket fixing, and test alignment"
spec:
  capabilities:
    - implement
    - ticket_fix
    - align_tests
  templates:
    # Implement: write code + unit tests, run cargo check before finishing
    implement: >-
      opencode run
      "You are working on the Agent Orchestrator project at {source_tree}.
      Your goal: {goal}.

      Use /rust-conventions for all Rust code.
      Use /test-authoring — add unit tests for new logic.

      Plan from previous step:
      {plan_output}

      Implement the changes. After writing code, run 'cd {source_tree}/core && cargo check'
      to verify compilation before finishing."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed

    # Ticket fix: read tickets, verify, fix, re-run QA, delete ticket on success
    ticket_fix: >-
      opencode run
      "/ticket-fix {ticket_paths}

      Project: {source_tree}
      Fix the QA tickets. Read each ticket, verify the issue, apply fixes,
      re-run the failing scenario, and delete the ticket once verified."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed

    # Align tests: run cargo test + clippy + build, iterate until all pass
    align_tests: >-
      opencode run
      "/align-tests

      Project: {source_tree}
      Diff: {diff}

      Run unit tests, analyze failures caused by the recent changes,
      update tests and/or implementation to align, iterate until stable.
      Also fix all clippy warnings and compilation warnings."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed
---
# Tester agent (MiniMax-M2.5-highspeed) — QA scenario execution
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: tester
  description: "MiniMax-M2.5-highspeed-powered tester agent — QA scenario execution and ticket creation"
spec:
  capabilities:
    - qa_testing
  templates:
    # QA testing: rebuild CLI, execute QA scenarios, create tickets for failures
    qa_testing: >-
      opencode run
      "/qa-testing

      Project: {source_tree}
      QA targets: docs/qa/
      Ticket dir: docs/ticket/

      Execute the QA test scenarios. For each scenario, follow the steps
      and verify expected outcomes. Create tickets for failures."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed
---
# Reviewer agent (MiniMax-M2.5-highspeed) — doc audit and code review
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: reviewer
  description: "MiniMax-M2.5-highspeed-powered reviewer agent — doc governance and code review"
spec:
  capabilities:
    - doc_governance
    - review
    - loop_guard
  templates:
    # Doc governance: audit QA doc quality
    doc_governance: >-
      opencode run
      "/qa-doc-governance

      Project: {source_tree}
      Audit QA documentation quality across docs/qa/.
      Fix doc drift, enforce scenario limits and checklist conventions,
      ensure README/manifest consistency."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed

    # Review: read-only code analysis (optional, not in default pipeline)
    review: >-
      opencode run
      "Review the code changes in {source_tree}.

      Diff: {diff}

      Check for:
      1. Security issues (OWASP top 10)
      2. Error handling correctness
      3. Test coverage gaps
      4. Rust conventions compliance

      Report findings as structured JSON with severity levels."
      --model minimax-coding-plan/MiniMax-M2.5-highspeed

    # Loop guard: builtin no-op placeholder for validation
    loop_guard: "echo loop_guard"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: self-bootstrap
spec:
  steps:
    # Phase 1: Planning — create implementation plan (architect/minimax)
    - id: plan
      type: plan
      required_capability: plan
      enabled: true
      repeatable: false
      tty: false

    # Phase 2: QA Doc Generation — produce executable test docs from plan (architect/minimax)
    - id: qa_doc_gen
      type: qa_doc_gen
      required_capability: qa_doc_gen
      enabled: true
      repeatable: false
      tty: false

    # Phase 3: Implementation — write code + unit tests (coder/minimax)
    - id: implement
      type: implement
      required_capability: implement
      enabled: true
      repeatable: true
      tty: false

    # Phase 4: QA Testing — rebuild CLI + execute QA scenarios + create tickets (tester/minimax)
    - id: qa_testing
      type: qa_testing
      required_capability: qa_testing
      enabled: true
      repeatable: true
      tty: false

    # Phase 5: Ticket Fix — fix QA failures (coder/minimax, prehook: only when tickets exist)
    - id: ticket_fix
      type: ticket_fix
      required_capability: ticket_fix
      enabled: true
      repeatable: true
      tty: false
      prehook:
        engine: cel
        when: "active_ticket_count > 0"
        reason: "Only fix tickets when there are active tickets"

    # Phase 6: Align Tests — cargo test + clippy + build, iterate until stable (coder/minimax)
    - id: align_tests
      type: align_tests
      required_capability: align_tests
      enabled: true
      repeatable: true
      tty: false

    # Phase 7: Doc Governance — audit and remediate doc quality (reviewer/minimax)
    - id: doc_governance
      type: doc_governance
      required_capability: doc_governance
      enabled: true
      repeatable: false
      tty: false

    # Phase 8: Loop guard (reviewer/minimax)
    - id: loop_guard
      type: loop_guard
      enabled: true
      repeatable: true
      is_guard: true
      builtin: loop_guard

  loop:
    mode: infinite
    max_cycles: 5
    enabled: true
    stop_when_no_unresolved: true

  safety:
    max_consecutive_failures: 3
    auto_rollback: false
    checkpoint_strategy: git_tag
