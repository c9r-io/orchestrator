# API keys for promotion platforms.
# Apply separately to avoid committing secrets to the manifest:
#
#   orchestrator apply -f docs/workflow/promotion-secrets.yaml --project promotion
#
# Before applying, set environment variables:
#   export DEVTO_API_KEY="your_dev_to_api_key"
---
apiVersion: orchestrator.dev/v2
kind: SecretStore
metadata:
  name: devto-api
spec:
  data:
    DEVTO_API_KEY: "${DEVTO_API_KEY}"
---
apiVersion: orchestrator.dev/v2
kind: SecretStore
metadata:
  name: claude-sonnet-promo
spec:
  data:
    ANTHROPIC_MODEL: "claude-sonnet-4-6"
