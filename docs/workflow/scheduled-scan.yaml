# Scheduled Scan — cron-triggered security audit workflow template.
#
# Usage:
#   orchestrator apply -f docs/workflow/scheduled-scan.yaml --project scan
#
#   # Manual run:
#   orchestrator task create --name "scan-1" --goal "Run security audit" --workflow scheduled_scan --project scan
#
#   # Or let the cron trigger create tasks automatically (webhook server enabled by default on 127.0.0.1:19090).
#
# Demonstrates: Trigger resource with cron schedule, agent-driven security
# analysis followed by static checks, and automated task creation.
# All agents are echo-based — no API keys required.
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets: []
  ticket_dir: ""
---
# ── Step Templates ────────────────────────────────────────────────────
# Two-phase audit: agent-driven analysis first, then static tooling.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: agent_audit
spec:
  description: "Agent-driven security analysis — reason about architecture and risk"
  prompt: >-
    You are a security engineer reviewing the project at {source_tree}.
    Goal: {goal}.

    Perform a threat-model-aware security review:
    1. Identify trust boundaries (user input, network, filesystem, IPC)
    2. Review authentication and authorization logic for bypass risks
    3. Check for injection vectors (command, SQL, path traversal, template)
    4. Assess secrets handling — are credentials hardcoded or leaked in logs?
    5. Evaluate error handling — does it expose internal state?

    Output a structured report: for each finding, provide title, description,
    severity (critical/high/medium/low/info), and a recommended fix.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: static_check
spec:
  description: "Static tooling checks — dependency audit and pattern scanning"
  prompt: >-
    Run static security checks on the project at {source_tree}.

    Execute the following (adapt to your project's toolchain):
    - Dependency audit: `cargo audit` / `npm audit` / `pip-audit`
    - Secret scanning: `rg -n '(?i)(password|secret|api_key|token)\s*=' --type-not yaml`
    - Known vulnerable patterns: check for eval(), exec(), unsafe deserialization

    Summarize results. Only report actionable findings — skip informational noise.
---
# ── Agent ─────────────────────────────────────────────────────────────
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: scan-agent
  description: "Security audit agent — performs agent-driven and static analysis"
spec:
  capabilities:
    - audit
    - static_check
  command: >-
    echo '{"confidence":0.94,"quality_score":0.91,
    "artifacts":[{"kind":"analysis","findings":[
    {"title":"no-critical-issues","description":"No critical security issues found. 2 low-severity recommendations noted.","severity":"info"}
    ]}]}'
---
# ── Workflow ──────────────────────────────────────────────────────────
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: scheduled_scan
spec:
  max_parallel: 1
  steps:
    # Step 1: Agent-driven security analysis (high-value, reasoning-based)
    - id: agent_audit
      scope: task
      required_capability: audit
      template: agent_audit
      enabled: true
      repeatable: false
    # Step 2: Static tooling checks (complement agent analysis)
    - id: static_check
      scope: task
      required_capability: static_check
      template: static_check
      enabled: true
      repeatable: false
  loop:
    mode: fixed
    max_cycles: 1
---
# ── Trigger ───────────────────────────────────────────────────────────
# Cron trigger: creates a new task automatically on schedule.
# Webhook server enabled by default on 127.0.0.1:19090 (use --webhook-bind to change or --webhook-bind none to disable).
---
apiVersion: orchestrator.dev/v2
kind: Trigger
metadata:
  name: weekly-scan
spec:
  cron:
    schedule: "0 3 * * 1"
    timezone: "UTC"
  action:
    workflow: scheduled_scan
    workspace: default
    goal: "Weekly automated security audit"
    start: true
  concurrency_policy: Forbid
