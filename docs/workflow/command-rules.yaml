# Command Rules — session reuse and isolation template.
#
# Usage:
#   orchestrator apply -f docs/workflow/command-rules.yaml --project cmd-rules
#   orchestrator task create --name "session-demo" --goal "Demonstrate session reuse" --workflow command_rules --project cmd-rules
#
# Demonstrates the canonical use case for command_rules + step_vars:
# Agent session reuse across workflow steps, with selective isolation.
#
# Scenario:
#   1. create_session: generates a session ID (captured to pipeline vars)
#   2. plan:           reuses session via command_rules (session context preserved)
#   3. implement:      reuses session (builds on plan context)
#   4. qa_testing:     step_vars clears session → forces fresh session (no bias)
#
# All agents are echo-based — no API keys required.
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
---
# ── Step Templates ────────────────────────────────────────────────────
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: create_session
spec:
  description: "Create a new agent session and capture its ID"
  prompt: >-
    Initialize a new analysis session for: {goal}.
    Output a JSON object with a session_id field.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: plan
spec:
  description: "Create implementation plan (reuses session context)"
  prompt: >-
    You are working on a project at {source_tree}.
    Create an implementation plan for: {goal}.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: implement
spec:
  description: "Implement changes (reuses session context from plan)"
  prompt: >-
    Implement the changes for: {goal}.
    Follow the plan from the previous step.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: qa_review
spec:
  description: "Independent QA review (fresh session, no prior bias)"
  prompt: >-
    Independently review the project at {source_tree} for: {goal}.
    Perform QA verification without relying on prior session context.
---
# ── Agent with command_rules ──────────────────────────────────────────
#
# Session reuse pattern:
#   Default command:  creates a new session (--session-id new)
#   Rule[0]:          if loop_session_id is set, resumes existing session (--resume)
#
# With echo agents, the commands differ in output to demonstrate switching.
# In production, replace echo with: claude -p "{prompt}" --session-id new ...
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: session-agent
  description: "Agent with session reuse via command_rules"
spec:
  capabilities:
    - create_session
    - plan
    - implement
    - qa_review
  command: >-
    echo '{"session_id":"ses-abc-123","confidence":0.90,"quality_score":0.88,
    "artifacts":[{"kind":"analysis","findings":[
    {"title":"new-session","description":"Started NEW session.","severity":"info"}
    ]}]}'
  command_rules:
    # When loop_session_id exists → resume session instead of creating new one
    - when: "loop_session_id != \"\""
      command: >-
        echo '{"confidence":0.94,"quality_score":0.92,
        "artifacts":[{"kind":"analysis","findings":[
        {"title":"resumed-session","description":"RESUMED existing session for continuity.","severity":"info"}
        ]}]}'
---
# ── Workflow ──────────────────────────────────────────────────────────
#
# Step-by-step command selection:
#
#   create_session → loop_session_id absent   → default cmd (new session)
#                    captures session_id to loop_session_id
#   plan           → loop_session_id = "ses-abc-123" → rule[0] (resume)
#   implement      → loop_session_id = "ses-abc-123" → rule[0] (resume)
#   qa_testing     → step_vars clears loop_session_id → default cmd (new session)
#                    after step: loop_session_id restored to "ses-abc-123"
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: command_rules
spec:
  max_parallel: 1
  steps:
    # Step 1: Create session — no loop_session_id yet → default command
    # Captures session_id from stdout JSON into loop_session_id pipeline var
    - id: create_session
      type: plan
      scope: task
      required_capability: create_session
      template: create_session
      enabled: true
      repeatable: false
      behavior:
        captures:
          - var: loop_session_id
            source: stdout
            json_path: "$.session_id"
    # Step 2: Plan — loop_session_id = "ses-abc-123" → rule[0] matches (resume)
    - id: plan
      type: plan
      scope: task
      required_capability: plan
      template: plan
      enabled: true
      repeatable: false
    # Step 3: Implement — loop_session_id still set → rule[0] matches (resume)
    - id: implement
      type: implement
      scope: task
      required_capability: implement
      template: implement
      enabled: true
      repeatable: false
    # Step 4: QA review — step_vars clears loop_session_id → fresh session
    # This ensures QA has no bias from prior session context.
    - id: qa_testing
      type: qa_review
      scope: task
      required_capability: qa_review
      template: qa_review
      enabled: true
      repeatable: false
      step_vars:
        loop_session_id: ""
  loop:
    mode: once
