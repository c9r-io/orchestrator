# Command Rules — conditional agent command selection template.
#
# Usage:
#   orchestrator apply -f docs/workflow/command-rules.yaml --project cmd-rules
#   orchestrator task create --name "session-demo" --goal "Demonstrate command rules" --workflow command_rules --project cmd-rules
#
# Demonstrates: Agent command_rules (CEL conditional command selection)
# and step_vars (per-step pipeline variable overlay).
#
# How command_rules work:
#   1. Each rule has a `when` CEL expression evaluated against pipeline variables
#   2. Pipeline variables are top-level CEL names (e.g. `my_var != ""`, NOT `vars.my_var`)
#   3. First matching rule's command is used; no match → default `command`
#   4. step_vars temporarily override pipeline variables for a single step
#
# All agents are echo-based — no API keys required.
apiVersion: orchestrator.dev/v2
kind: Workspace
metadata:
  name: default
spec:
  root_path: "."
  qa_targets:
    - docs/qa
  ticket_dir: docs/ticket
---
# ── Step Templates ────────────────────────────────────────────────────
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: analyze
spec:
  description: "Analyze the project"
  prompt: >-
    Analyze the project at {source_tree} for: {goal}.
---
apiVersion: orchestrator.dev/v2
kind: StepTemplate
metadata:
  name: review
spec:
  description: "Review with independent context"
  prompt: >-
    Review the project at {source_tree} for: {goal}.
    This is an independent review.
---
# ── Agent with command_rules ──────────────────────────────────────────
#
# CEL expressions reference pipeline variables by name directly:
#   - `run_mode != ""` → true if run_mode was set (by step_vars or captures)
#   - `run_mode == "verbose"` → matches specific value
#
# The matched rule index is recorded in command_runs.command_rule_index
# for audit (NULL = default command, 0 = first rule, 1 = second rule).
---
apiVersion: orchestrator.dev/v2
kind: Agent
metadata:
  name: adaptive-agent
  description: "Agent with CEL-driven command selection"
spec:
  capabilities:
    - analyze
    - review
  command: >-
    echo '{"confidence":0.90,"quality_score":0.88,
    "artifacts":[{"kind":"analysis","findings":[
    {"title":"default-mode","description":"Running in default mode.","severity":"info"}
    ]}]}'
  command_rules:
    # Rule 0: verbose mode — triggered by step_vars override
    - when: "run_mode == \"verbose\""
      command: >-
        echo '{"confidence":0.95,"quality_score":0.94,
        "artifacts":[{"kind":"analysis","findings":[
        {"title":"verbose-mode","description":"Running in VERBOSE mode with extra diagnostics.","severity":"info"}
        ]}]}'
    # Rule 1: quick mode — triggered by step_vars override
    - when: "run_mode == \"quick\""
      command: >-
        echo '{"confidence":0.85,"quality_score":0.80,
        "artifacts":[{"kind":"analysis","findings":[
        {"title":"quick-mode","description":"Running in QUICK mode, minimal analysis.","severity":"info"}
        ]}]}'
---
# ── Workflow ──────────────────────────────────────────────────────────
# Three steps demonstrate how step_vars controls command_rules matching:
#
#   Step 1: no step_vars → run_mode absent → no rule matches → default command
#   Step 2: step_vars { run_mode: "verbose" } → rule[0] matches → verbose command
#   Step 3: step_vars { run_mode: "quick" }   → rule[1] matches → quick command
---
apiVersion: orchestrator.dev/v2
kind: Workflow
metadata:
  name: command_rules
spec:
  max_parallel: 1
  steps:
    # Step 1: Default mode — no step_vars, so no rule matches
    - id: default_analysis
      type: analyze
      scope: task
      required_capability: analyze
      template: analyze
      enabled: true
      repeatable: false
    # Step 2: Verbose mode — step_vars sets run_mode="verbose", rule[0] matches
    - id: verbose_analysis
      type: analyze
      scope: task
      required_capability: analyze
      template: analyze
      enabled: true
      repeatable: false
      step_vars:
        run_mode: "verbose"
    # Step 3: Quick review — step_vars sets run_mode="quick", rule[1] matches
    - id: quick_review
      type: review
      scope: task
      required_capability: review
      template: review
      enabled: true
      repeatable: false
      step_vars:
        run_mode: "quick"
  loop:
    mode: once
